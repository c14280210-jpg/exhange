<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🦛 Курси валют</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>

    <!-- Ліва панель: бегемотик -->
    <div class="left-panel">
        <div class="brand">
            <span class="brand-icon">🦛</span>
            <span class="brand-name">Курси<span>Валют</span></span>
        </div>
        <div class="hippo-wrapper">
            <canvas id="hippoCanvas"></canvas>
            <div class="hippo-caption">
                <span class="status-dot idle" id="statusDot"></span>
                <span id="statusText">Готово</span>
            </div>
        </div>
        <div class="left-footer">
            <span>Оновлено: <strong id="updateTime">--:--:--</strong></span>
        </div>
    </div>

    <!-- Права панель: курси -->
    <div class="right-panel">
        <div class="panel-header">
            <div>
                <h1>Курси валют</h1>
                <p class="subtitle">Ручне керування</p>
            </div>
            <button class="refresh-btn" onclick="saveRates()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
                </svg>
                Зберегти
            </button>
        </div>

        <div class="currency-list">
            <!-- USD -->
            <div class="currency-item">
                <div class="currency-info">
                    <span class="flag">🇺🇸</span>
                    <div>
                        <div class="currency-name">USD</div>
                        <div class="currency-full">Долар США</div>
                    </div>
                </div>
                <div class="rates">
                    <div class="rate-block">
                        <span class="rate-label">Купівля</span>
                        <input type="number" step="0.01" class="rate-input" id="usd-buy" placeholder="0.00" />
                    </div>
                    <div class="rate-block">
                        <span class="rate-label">Продаж</span>
                        <input type="number" step="0.01" class="rate-input" id="usd-sell" placeholder="0.00" />
                    </div>
                </div>
                <div class="change-badge" id="usd-change">—</div>
            </div>

            <!-- EUR -->
            <div class="currency-item">
                <div class="currency-info">
                    <span class="flag">🇪🇺</span>
                    <div>
                        <div class="currency-name">EUR</div>
                        <div class="currency-full">Євро</div>
                    </div>
                </div>
                <div class="rates">
                    <div class="rate-block">
                        <span class="rate-label">Купівля</span>
                        <input type="number" step="0.01" class="rate-input" id="eur-buy" placeholder="0.00" />
                    </div>
                    <div class="rate-block">
                        <span class="rate-label">Продаж</span>
                        <input type="number" step="0.01" class="rate-input" id="eur-sell" placeholder="0.00" />
                    </div>
                </div>
                <div class="change-badge" id="eur-change">—</div>
            </div>

            <!-- PLN -->
            <div class="currency-item">
                <div class="currency-info">
                    <span class="flag">🇵🇱</span>
                    <div>
                        <div class="currency-name">PLN</div>
                        <div class="currency-full">Злотий</div>
                    </div>
                </div>
                <div class="rates">
                    <div class="rate-block">
                        <span class="rate-label">Купівля</span>
                        <input type="number" step="0.01" class="rate-input" id="pln-buy" placeholder="0.00" />
                    </div>
                    <div class="rate-block">
                        <span class="rate-label">Продаж</span>
                        <input type="number" step="0.01" class="rate-input" id="pln-sell" placeholder="0.00" />
                    </div>
                </div>
                <div class="change-badge" id="pln-change">—</div>
            </div>
        </div>

        <div class="panel-footer">
            <span>Введіть курси та натисніть «Зберегти»</span>
            <span class="status-indicator" id="liveIndicator">● РЕДАГУВАННЯ</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
