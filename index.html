<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦛 Курси валют з бегемотиком</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 3D Бегемотик -->
    <div id="hippo-container"></div>

    <!-- Основний контент -->
    <div class="content">
        <h1>💰 Курси валют</h1>
        <div class="update-status">
            <span id="update-indicator" class="indicator idle"></span>
            <span id="update-time">Оновлено: --:--:--</span>
        </div>
        
        <div class="currency-cards">
            <div class="currency-card" data-currency="USD">
                <div class="currency-flag">🇺🇸</div>
                <div class="currency-name">Долар США</div>
                <div class="currency-rate" id="usd-rate">--</div>
                <div class="currency-change" id="usd-change">---</div>
            </div>

            <div class="currency-card" data-currency="EUR">
                <div class="currency-flag">🇪🇺</div>
                <div class="currency-name">Євро</div>
                <div class="currency-rate" id="eur-rate">--</div>
                <div class="currency-change" id="eur-change">---</div>
            </div>

            <div class="currency-card" data-currency="PLN">
                <div class="currency-flag">🇵🇱</div>
                <div class="currency-name">Злотий</div>
                <div class="currency-rate" id="pln-rate">--</div>
                <div class="currency-change" id="pln-change">---</div>
            </div>
        </div>

        <div class="controls">
            <button onclick="manualRefresh()" class="refresh-btn">🔄 Оновити зараз</button>
            <span id="next-update">Наступне оновлення: 30с</span>
        </div>
    </div>

    <!-- Бібліотеки для 3D -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <!-- Головний скрипт -->
    <script src="script.js"></script>
</body>
</html>
